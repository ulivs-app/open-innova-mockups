document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +

            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:1px solid #cfdbe5; border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; background:#34a0f3; color:#fff; font-size:13px; font-weight:600; padding:8px 12px; border-radius:7px; align-self:flex-start;\">Biblioteca Coruscant [100001 - Prove di Volo] <span style=\"cursor:pointer; opacity:.8;\">✕<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:8px; background:#34a0f3; color:#fff; font-size:13px; font-weight:600; padding:8px 12px; border-radius:7px; align-self:flex-start;\">Biblioteca Coruscant [100001 - SpazioPorto sicuro] <span style=\"cursor:pointer; opacity:.8;\">✕<\u002Fspan><\u002Fdiv>\n              <input placeholder=\"Cerca e aggiungi…\" style=\"border:none; outline:none; padding:8px 6px; font-size:14px; color:#2a2f35; font-family:inherit; background:transparent;\">\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ANNOTAZIONI -->\n          <sc-if value=\"{{ schedaAnnot }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:21px; font-weight:800; line-height:1.3; letter-spacing:-.01em; margin-bottom:14px;\">Eventuali annotazioni sul Volontario: Skywalker Luke<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.04em; color:#9aa0a7; line-height:1.5; margin-bottom:18px;\">LE ANNOTAZIONI INSERITE SONO VISIBILI SOLTANTO AGLI ALTRI OPERATORI. NON SARANNO VISIBILI AGLI OLP.<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:.06em; color:#9aa0a7; margin-bottom:8px;\">ANNOTAZIONI<\u002Fdiv>\n            <textarea style=\"width:100%; min-height:120px; border:1px solid #cfdbe5; background:#f0f4f7; border-radius:6px; padding:12px 14px; font-size:14px; color:#2a2f35; font-family:inherit; resize:vertical;\">Provasq<\u002Ftextarea>\n          <\u002Fsc-if>\n\n          <div style=\"border-top:1px solid #e6edf2; padding-top:20px; margin-top:24px; display:flex; justify-content:flex-end;\">\n            <button onclick=\"{{ closeModal }}\" style=\"background:#34a0f3; color:#fff; border:none; font-size:14px; font-weight:600; padding:11px 26px; border-radius:6px; cursor:pointer;\">Salva<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    role: 'vol',\n    device: 'desktop',\n    volScreen: 'dashboard',\n    adminScreen: 'volontari',\n    modal: null,\n    assenzaType: null,\n    rowMenu: null,\n    adminAcc: null,\n    schedaTab: 'anagrafica',\n    inserisciOpen: false,\n    contatoriOpen: false,\n    mobileNav: false,\n    docFiles: { residenza: false, iban: false },\n    regFiles: { mese: false, olp: false },\n    giustFile: true,\n    filtriOpen: false,\n  };\n\n  schedaTabStyle(active) {\n    return 'border:1px solid; cursor:pointer; font-size:13px; font-weight:600; padding:7px 14px; border-radius:8px; ' +\n      (active ? 'background:#e6f1fa; color:#34a0f3; border-color:#aed9fa;' : 'background:#fff; color:#5b6168; border-color:transparent;');\n  }\n  grpStyle(active) {\n    return 'padding:11px 14px; border-radius:6px; font-size:15px; display:flex; align-items:center; gap:11px; cursor:pointer; ' +\n      (active ? 'color:#1a1d21; font-weight:700;' : 'color:#3a4047; font-weight:600;');\n  }\n  subStyle(active) {\n    return 'padding:9px 14px; border-radius:8px; font-size:14px; cursor:pointer; ' +\n      (active ? 'background:#e6f1fa; color:#34a0f3; font-weight:600;' : 'color:#3a4047; font-weight:500;');\n  }\n  tab(active) {\n    return 'border:none; cursor:pointer; font-size:13px; font-weight:600; padding:7px 16px; border-radius:7px; transition:all .15s; ' +\n      (active ? 'background:#34a0f3; color:#fff;' : 'background:transparent; color:#5b6168;');\n  }\n\n  renderVals() {\n    const s = this.state;\n    const isVol = s.role === 'vol';\n    const isDesktop = s.device === 'desktop';\n    return {\n      // tab styles\n      tabVol: this.tab(isVol),\n      tabAdmin: this.tab(!isVol),\n      tabDesktop: this.tab(isDesktop),\n      tabMobile: this.tab(!isDesktop),\n      // role / device\n      setRoleVol: () => this.setState({ role: 'vol', modal: null, mobileNav: false, rowMenu: null, inserisciOpen: false }),\n      setRoleAdmin: () => this.setState({ role: 'admin', modal: null, mobileNav: false }),\n      setDesktop: () => this.setState({ device: 'desktop', mobileNav: false }),\n      setMobile: () => this.setState({ device: 'mobile' }),\n      // screen flags\n      showVolDesktop: isVol && isDesktop,\n      showVolMobile: isVol && !isDesktop,\n      showAdminDesktop: !isVol && isDesktop,\n      showAdminMobile: !isVol && !isDesktop,\n      volDash: s.volScreen === 'dashboard',\n      volReg: s.volScreen === 'registro',\n      adminVol: s.adminScreen === 'volontari',\n      adminAss: s.adminScreen === 'assenze',\n      // nav\n      navVolHomeActive: 'padding:11px 14px; border-radius:6px; font-size:15px; font-weight:700; color:#1a1d21; display:flex; align-items:center; gap:11px;',\n      openMobileNav: () => this.setState({ mobileNav: true }),\n      closeMobileNav: () => this.setState({ mobileNav: false }),\n      mobileNav: s.mobileNav,\n      goVolRegistro: () => this.setState({ volScreen: 'registro', mobileNav: false }),\n      goVolDash: () => this.setState({ volScreen: 'dashboard', mobileNav: false }),\n      goVolAssenze: () => this.setState({ volScreen: 'assenze', mobileNav: false }),\n      volScreen: s.volScreen,\n      navHomeGrp: this.grpStyle(s.volScreen === 'dashboard'),\n      navPresGrp: this.grpStyle(s.volScreen === 'registro' || s.volScreen === 'assenze'),\n      navDashItem: this.subStyle(s.volScreen === 'dashboard'),\n      navRegItem: this.subStyle(s.volScreen === 'registro'),\n      navAssItem: this.subStyle(s.volScreen === 'assenze'),\n      // modals\n      modal: s.modal,\n      openDocAvvio: () => this.setState({ modal: 'docAvvio' }),\n      openVolRegUpload: () => this.setState({ modal: 'volReg' }),\n      closeModal: () => this.setState({ modal: null }),\n      modalDocAvvio: s.modal === 'docAvvio',\n      modalVolReg: s.modal === 'volReg',\n      docResidenza: s.docFiles.residenza,\n      docResidenzaEmpty: !s.docFiles.residenza,\n      docIban: s.docFiles.iban,\n      docIbanEmpty: !s.docFiles.iban,\n      uploadResidenza: () => this.setState({ docFiles: { ...s.docFiles, residenza: true } }),\n      removeResidenza: () => this.setState({ docFiles: { ...s.docFiles, residenza: false } }),\n      uploadIban: () => this.setState({ docFiles: { ...s.docFiles, iban: true } }),\n      removeIban: () => this.setState({ docFiles: { ...s.docFiles, iban: false } }),\n      regMese: s.regFiles.mese,\n      regMeseEmpty: !s.regFiles.mese,\n      regMeseBadge: 'font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; ' + (s.regFiles.mese ? 'background:#e0f3ea; color:#1c8f5a;' : 'background:#fceedb; color:#9c6a1b;'),\n      regMeseBadgeText: s.regFiles.mese ? 'Caricato' : 'Da caricare',\n      regOlp: s.regFiles.olp,\n      regOlpEmpty: !s.regFiles.olp,\n      uploadRegMese: () => this.setState({ regFiles: { ...s.regFiles, mese: true } }),\n      removeRegMese: () => this.setState({ regFiles: { ...s.regFiles, mese: false } }),\n      uploadRegOlp: () => this.setState({ regFiles: { ...s.regFiles, olp: true } }),\n      removeRegOlp: () => this.setState({ regFiles: { ...s.regFiles, olp: false } }),\n      // admin navigation\n      goAdminVolontari: () => this.setState({ adminScreen: 'volontari', rowMenu: null, inserisciOpen: false }),\n      goAdminAssenze: () => this.setState({ adminScreen: 'assenze', rowMenu: null, inserisciOpen: false }),\n      openAdminReg: () => this.setState({ modal: 'volReg', rowMenu: null }),\n      openGiust: () => this.setState({ modal: 'giust', rowMenu: null, inserisciOpen: false }),\n      modalGiust: s.modal === 'giust',\n      giustFile: s.giustFile,\n      uploadGiust: () => this.setState({ giustFile: true }),\n      removeGiust: () => this.setState({ giustFile: false }),\n      filtriOpen: s.filtriOpen,\n      toggleFiltri: () => this.setState({ filtriOpen: !s.filtriOpen }),\n      filtriBtn: 'font-size:13px; font-weight:600; padding:9px 15px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:8px; ' + (s.filtriOpen ? 'border:1px solid #34a0f3; background:#e6f1fa; color:#34a0f3;' : 'border:1px solid #c6d2db; background:#fff; color:#2a2f35;'),\n      // contatori\n      contatoriOpen: s.contatoriOpen,\n      contatoriClosed: !s.contatoriOpen,\n      toggleContatori: () => this.setState({ contatoriOpen: !s.contatoriOpen }),\n      contatoriChevron: s.contatoriOpen ? '⌃' : '⌄',\n      // row action menu (Skywalker)\n      rowMenu0: s.rowMenu === 0,\n      toggleRow0: () => this.setState({ rowMenu: s.rowMenu === 0 ? null : 0 }),\n      acc0: s.adminAcc === 0, acc1: s.adminAcc === 1, acc2: s.adminAcc === 2,\n      acc3: s.adminAcc === 3, acc4: s.adminAcc === 4, acc5: s.adminAcc === 5,\n      chev0: s.adminAcc === 0 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      chev1: s.adminAcc === 1 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      chev2: s.adminAcc === 2 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      chev3: s.adminAcc === 3 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      chev4: s.adminAcc === 4 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      chev5: s.adminAcc === 5 ? 'tabler:chevron-up' : 'tabler:chevron-down',\n      tAcc0: () => this.setState({ adminAcc: s.adminAcc === 0 ? null : 0, rowMenu: null }),\n      tAcc1: () => this.setState({ adminAcc: s.adminAcc === 1 ? null : 1, rowMenu: null }),\n      tAcc2: () => this.setState({ adminAcc: s.adminAcc === 2 ? null : 2, rowMenu: null }),\n      tAcc3: () => this.setState({ adminAcc: s.adminAcc === 3 ? null : 3, rowMenu: null }),\n      tAcc4: () => this.setState({ adminAcc: s.adminAcc === 4 ? null : 4, rowMenu: null }),\n      tAcc5: () => this.setState({ adminAcc: s.adminAcc === 5 ? null : 5, rowMenu: null }),\n      // inserisci assenza dropdown\n      inserisciOpen: s.inserisciOpen,\n      toggleInserisci: () => this.setState({ inserisciOpen: !s.inserisciOpen }),\n      insMalattia: () => this.setState({ modal: 'assenza', assenzaType: 'Malattia', inserisciOpen: false }),\n      insPermesso: () => this.setState({ modal: 'assenza', assenzaType: 'Permesso', inserisciOpen: false }),\n      insRecupero: () => this.setState({ modal: 'assenza', assenzaType: 'Recupero Compensativo', inserisciOpen: false }),\n      insIngiust: () => this.setState({ modal: 'assenza', assenzaType: 'Permesso per Assenza Ingiustificata', inserisciOpen: false }),\n      insStraord: () => this.setState({ modal: 'assenza', assenzaType: 'Permesso Straordinario', inserisciOpen: false }),\n      insInfortunio: () => this.setState({ modal: 'assenza', assenzaType: 'Infortunio', inserisciOpen: false }),\n      insMaternita: () => this.setState({ modal: 'assenza', assenzaType: 'Maternità', inserisciOpen: false }),\n      assenzaType: s.assenzaType,\n      modalAssenza: s.modal === 'assenza',\n      // scheda volontario (tabbed)\n      modalScheda: s.modal === 'scheda',\n      schedaAnag: s.schedaTab === 'anagrafica',\n      schedaDoc: s.schedaTab === 'documenti',\n      schedaSedi: s.schedaTab === 'sedi',\n      schedaAnnot: s.schedaTab === 'annotazioni',\n      tabSAnag: this.schedaTabStyle(s.schedaTab === 'anagrafica'),\n      tabSDoc: this.schedaTabStyle(s.schedaTab === 'documenti'),\n      tabSSedi: this.schedaTabStyle(s.schedaTab === 'sedi'),\n      tabSAnnot: this.schedaTabStyle(s.schedaTab === 'annotazioni'),\n      openSchedaAnag: () => this.setState({ modal: 'scheda', schedaTab: 'anagrafica', rowMenu: null }),\n      openSchedaDoc: () => this.setState({ modal: 'scheda', schedaTab: 'documenti', rowMenu: null }),\n      openSchedaSedi: () => this.setState({ modal: 'scheda', schedaTab: 'sedi', rowMenu: null }),\n      openSchedaAnnot: () => this.setState({ modal: 'scheda', schedaTab: 'annotazioni', rowMenu: null }),\n      setSchedaAnag: () => this.setState({ schedaTab: 'anagrafica' }),\n      setSchedaDoc: () => this.setState({ schedaTab: 'documenti' }),\n      setSchedaSedi: () => this.setState({ schedaTab: 'sedi' }),\n      setSchedaAnnot: () => this.setState({ schedaTab: 'annotazioni' }),\n    };\n  }\n\n  dashboardHtmlUNUSED() {\n    const card = (icon, label, val, tot, barColor, pct) => `\n      <div style=\"border:1px solid #cfdbe5; border-radius:10px; padding:20px 22px; background:#fff;\">\n        <div style=\"display:flex; align-items:center; gap:13px; margin-bottom:18px;\">\n          <div style=\"width:40px; height:40px; border-radius:8px; background:#e6f1fa; color:#34a0f3; display:flex; align-items:center; justify-content:center; font-size:18px;\">${icon}<\u002Fdiv>\n          <div style=\"font-size:15px; font-weight:600; color:#2a2f35; line-height:1.25;\">${label}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:12px;\">\n          <div style=\"font-size:34px; font-weight:800; letter-spacing:-.02em;\">${val}<\u002Fdiv>\n          <div style=\"font-size:13px; color:#9aa0a7;\">su ${tot} totali<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:6px; border-radius:6px; background:#eef0f3; overflow:hidden;\"><div style=\"height:100%; width:${pct}; background:${barColor}; border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>`;\n    return `\n      <h1 style=\"font-size:30px; font-weight:800; margin:0 0 26px; letter-spacing:-.02em;\">Ciao, Luke Skywalker!<\u002Fh1>\n      <div style=\"background:#e6f1fa; border-radius:10px; padding:26px 28px; display:flex; gap:20px; align-items:center; margin-bottom:26px;\">\n        <div style=\"flex:1; min-width:0;\">\n          <div style=\"font-size:18px; font-weigh ay:grid; grid-template-columns:1fr 1fr; gap:18px;\">\n        <div style=\"border:1px solid #cfdbe5; border-radius:10px; padding:22px 24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px;\"><div style=\"font-size:13px; color:#8a9099;\">Il tuo progetto<\u002Fdiv><button style=\"border:1px solid #c6d2db; background:#fff; color:#2a2f35; font-size:13px; font-weight:600; padding:8px 16px; border-radius:6px; cursor:pointer;\">Scarica Progetto<\u002Fbutton><\u002Fdiv>\n          <div style=\"font-size:21px; font-weight:800;\">Prove di Volo<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #cfdbe5; border-radius:10px; padding:22px 24px;\">\n          <div style=\"font-size:13px; color:#8a9099; margin-bottom:10px;\">La tua sede<\u002Fdiv>\n          <div style=\"font-size:21px; font-weight:800;\">Biblioteca Coruscant<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"GestiSCU Prototype.dc"}
